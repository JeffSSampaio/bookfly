<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="/Interface/styles/page-user.css">
   <link rel="stylesheet" href="/Interface/styles/h-navbar.css">
   <link rel="stylesheet" href="/Interface/styles/root.css">
   <link rel="stylesheet" href="/Interface/styles/modal-emprestimo.css">
   <link rel="stylesheet" href="/Interface/styles/s-emprestimos.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="stylesheet" href="/Interface/styles/homepage.css">
    <link rel="stylesheet" href="/Interface/styles/modal-emprestimo.css">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
 
    <title>Home</title>
</head>
<body>

    <div id="h-navbar-right" class="menu-right-container">
        <div id="menu-content" class="body-menu">
            <div class="menu-header">
                <span  id="close-menu">
                    <img class="icon-close" src="/Interface/assets/iconclose.svg" alt="" srcset="">
                </span>
                <h1>Menu</h1>
            </div>
        </div>
    </div>

    <div id="overlay"></div>

    <header class="h-navbar">
        <div class="title-logo">
            <img src="/Interface/assets/iconBook.svg" alt="" srcset="">
            <h1>BookFLy</h1>
        </div>
        <div class="h-container-actions-itens">
            <div class="search-input-container">
               
                <input type="search" name="" id="" placeholder="Buscar">
                <img src="/Interface/assets/iconlupa.svg" alt="" srcset="">
            </div>
            <button class="c-icon-menu">
                <img src="/Interface/assets/iconMenu.svg" alt="" class="icon-menu" id="icon-menu" onclick="btnMenu()">
            </button> 
        </div>
    </header>

    <div class="body-page">

        
    <div class="modal-emprestimo">
        <div class="c-modal-emprestimo">
            <div class="c-b-modal-emprestimo">

                <h1>Fazer Emprestimo</h1>
                <form class="form-emprestimo" action="" method="post">
                    <div class="f-input-emprestimo">
                        <label for="">Nome da Estante</label>
                        <input type="search" id="f-input-emprestimo">
                    </div>

                </form>
                <div class="c-emprestimo-btn">
                    <button onclick="closeModal()">fechar</button>
                    <button onclick="confirmModal()">confirmar</button>
                </div>
            </div>
        </div>

    </div>


        <div class="sec-1">
            <div class="btn-emprestimo-container">

             <button class="btn-emprestimo" id="btn-fazer-emprestimo" onclick="openModal()">
               <span>
                Fazer Emprestimo
             </span>
              </button>
        </div>
        <div class="s-emprestimo-body">
            <div class="s-emprestimo-container">
                  <h1 class="s-titulo-emprestimo">Emprestimo(s)</h1>
                 <div class="s-emprestimo" id="emprestimo">

                </div>
                 
            </div>
         <div  class="s-emprestimo-container">
                  <h1 class="s-titulo-emprestimo">Devolução</h1>
                <div class="s-emprestimo" id="devolucao">
                    
                </div>
                 
            </div>
        </div>


         

    </div>


    <footer>
        <h1>
            BookFLy
        </h1>
    </footer>

<script src="/Interface/scripts/modal-emprestimo.js"></script>    
<script src="/Interface/scripts/s-emprestimos.js"></script>
<script src="/Interface/scripts/h-navbar.js"></script>
