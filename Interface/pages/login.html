<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Interface/styles/auth-pages.css">
    <link rel="stylesheet" href="/Interface/styles/root.css">    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <title>BookFly - Login</title>
</head>
<body>

    <div class="auth-container">

        <div class="title-logo">
            <img src="/Interface/assets/iconBook.svg" alt="" srcset="">
            <h1>BookFLy</h1>
        </div>
        <form action="" class="auth-form">
            
            <div class="form-field">
                <label for="">Email</label>
                <input type="text" name="" id="login-email" placeholder="Digite seu email">
            </div>
            <div class="form-field">
                <label for="">Senha</label>
                <input type="password" name="" id="login-password" placeholder="Digite sua senha">
            </div>
            <button class="auth-submit-btn">
               <span> Entrar </span> 
            </button>
        </form>
        
        <div class="link">
            <p> Ainda não é registrado? <a href="/Interface/pages/register.html">Registre aqui!</a></p>
        </div>
    
    </div>
    <script src="/Interface/scripts/authGuard.js"></script>
    <script type="module" src="/Interface/scripts/login.js"></script>

</body>
</html>
